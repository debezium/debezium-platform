domain:
  url: ""
  name: ""

# Global imagePullSecrets applied to all container images by default.
# Per-component imagePullSecrets override this value (not merged).
# Example:
#   imagePullSecrets:
#     - name: my-registry-secret
imagePullSecrets: []

stage:
  image: quay.io/debezium/platform-stage:nightly
  imagePullPolicy: IfNotPresent
  # Overrides global imagePullSecrets for the stage image.
  imagePullSecrets: []

conductor:
  image: quay.io/debezium/platform-conductor:nightly
  imagePullPolicy: IfNotPresent
  # Overrides global imagePullSecrets for the conductor image.
  imagePullSecrets: []
  offset:
    existingConfigMap: ""
  descriptors:
    official:
      enabled: true
      registry: quay.io
      image: debezium/debezium-descriptors
      tag: nightly
      mountPath: /opt/descriptors
      # imagePullPolicy removed - not applicable for ORAS-based pulls
      # imagePullSecrets replaced by auth.existingSecret for ORAS credentials
      auth:
        existingSecret: ""  # Secret must contain keys: username, password

server:
  image: ""
  # imagePullPolicy is not yet supported by DebeziumOperator.
  # Tracked in: https://github.com/debezium/debezium/issues/1851
  imagePullSecrets: []

ingress:
  enabled: true
  className: ""
  annotations: {}
  tls:
    enabled: false
    secretName: ""
offset:
  reusePlatformDatabase: true
  database:
    name: postgres
    host: postgres
    port: 5432
    username: user
    password: password
    auth:
      existingSecret: ""
schemaHistory:
  reusePlatformDatabase: true
  database:
    name: postgres
    host: postgres
    port: 5432
    username: user
    password: password
    auth:
      existingSecret: ""
database:
  enabled: false
  name: postgres
  host: postgres
  auth:
    existingSecret: ""
debezium-operator:
  enabled: true
env: []