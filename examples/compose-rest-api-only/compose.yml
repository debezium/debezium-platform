services:
  conductor:
    container_name: conductor
    image: quay.io/debezium/platform-conductor:latest
    platform: linux/amd64
    pull_policy: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_USERNAME: conductor
      QUARKUS_DATASOURCE_PASSWORD: conductor
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/conductor
      QUARKUS_HTTP_CORS_ORIGINS: http://localhost:3000
    networks:
      - debezium-network

  postgres:
    container_name: postgres
    image: quay.io/debezium/postgres:14-alpine
    platform: linux/amd64
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: conductor
      POSTGRES_PASSWORD: conductor
      POSTGRES_DB: conductor
    networks:
      - debezium-network

  stage:
    build:
      context: ../../debezium-platform-stage
      dockerfile: Dockerfile
    depends_on:
      - conductor
    container_name: stage
    image: debezium-platform-stage:local
    platform: linux/amd64
    pull_policy: never
    ports:
      - "3000:3000"
    environment:
      CONDUCTOR_URL: http://localhost:8080
      VITE_CHAT_SERVICE_URL: http://localhost:8100
    networks:
      - debezium-network

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    platform: linux/amd64
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - debezium-network

  chat-service:
    build:
      context: ../../debezium-chat-service
    container_name: chat-service
    depends_on:
      - ollama
    ports:
      - "8100:8100"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}
      CONTEXT7_LIBRARY_ID: /debezium/debezium
      PORT: "8100"
    networks:
      - debezium-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama-data:

networks:
  debezium-network:
    name: debezium-network
